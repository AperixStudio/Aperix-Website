<!DOCTYPE html>
<html>
  <body>
    <!-- Netlify Forms detection for the Aperix contact form -->
    <form name="contact" data-netlify="true" netlify-honeypot="website" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="website" />
      <input name="Name" />
      <input name="Email" />
      <input name="Phone" />
      <input name="Business Name" />
      <input name="Business Type" />
      <input name="Preferred Contact" />
      <textarea name="Project Details"></textarea>
    </form>
  </body>
</html>
